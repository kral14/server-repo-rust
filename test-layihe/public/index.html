<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MasterDeploy Test Layihəsi</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --text-color: #f3f4f6;
            --text-secondary: #9ca3af;
            --accent: #3b82f6;
            --accent-hover: #2563eb;
            --success: #10b981;
            --error: #ef4444;
            --border: #1f2937;
        }

        body { 
            background: var(--bg-color); 
            color: var(--text-color); 
            font-family: 'Segoe UI', Roboto, sans-serif; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
            margin: 0; 
            padding: 1rem;
        }

        .container {
            width: 100%;
            max-width: 420px;
        }

        .card { 
            background: var(--card-bg); 
            padding: 2.5rem 2rem; 
            border-radius: 16px; 
            box-shadow: 0 10px 25px -5px rgba(0,0,0,0.5); 
            border: 1px solid var(--border);
            margin-bottom: 1.5rem;
        }

        h1 { 
            color: var(--text-color); 
            margin-top: 0; 
            font-size: 1.8rem; 
            text-align: center;
            font-weight: 700;
        }

        h1 span {
            color: var(--accent);
        }

        p.subtitle { 
            text-align: center;
            font-size: 0.95rem; 
            margin-top: -0.5rem;
            margin-bottom: 2rem; 
            color: var(--text-secondary); 
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-weight: 500;
        }

        .form-group input {
            width: 100%;
            padding: 0.75rem 1rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: #1f2937;
            color: var(--text-color);
            box-sizing: border-box;
            font-size: 0.95rem;
            transition: border-color 0.2s;
        }

        .form-group input:focus {
            outline: none;
            border-color: var(--accent);
        }

        button { 
            width: 100%;
            background: var(--accent); 
            color: white; 
            border: none; 
            padding: 0.8rem; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold;
            font-size: 1rem;
            transition: background 0.2s;
            margin-top: 0.5rem;
        }

        button:hover {
            background: var(--accent-hover);
        }

        .toggle-link {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
        }

        .toggle-link span {
            color: var(--accent);
            cursor: pointer;
            text-decoration: underline;
        }

        .api-card {
            background: var(--card-bg); 
            padding: 1.5rem; 
            border-radius: 12px; 
            border: 1px solid var(--border);
            text-align: center;
        }

        .status-badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.85rem;
            font-weight: 600;
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            margin-bottom: 0.5rem;
        }

        .status-badge.success {
            background: rgba(16, 185, 129, 0.1);
            color: var(--success);
        }

        .status-badge.error {
            background: rgba(239, 68, 68, 0.1);
            color: var(--error);
        }

        .msg-text {
            font-size: 0.9rem;
            color: var(--text-secondary);
            margin: 0.5rem 0 1rem 0;
        }

        .alert {
            padding: 0.75rem 1rem;
            border-radius: 8px;
            font-size: 0.9rem;
            margin-bottom: 1.25rem;
            display: none;
        }

        .alert.error {
            background: rgba(239, 68, 68, 0.15);
            color: var(--error);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .alert.success {
            background: rgba(16, 185, 129, 0.15);
            color: var(--success);
            border: 1px solid rgba(16, 185, 129, 0.2);
        }

        /* Dashboard Styles */
        .dash-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid var(--border);
            font-size: 0.95rem;
        }
        .dash-row:last-child {
            border-bottom: none;
        }
        .dash-label {
            color: var(--text-secondary);
        }
        .dash-value {
            font-weight: 600;
            color: var(--success);
        }
        .logout-btn {
            background: #374151;
            margin-top: 1.5rem;
        }
        .logout-btn:hover {
            background: #4b5563;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Auth Card -->
        <div class="card" id="auth-card">
            <h1 id="form-title">Sistemə <span>Giriş</span></h1>
            <p class="subtitle" id="form-subtitle">Lütfən məlumatlarınızı daxil edin</p>
            
            <div class="alert error" id="alert-error"></div>
            <div class="alert success" id="alert-success"></div>

            <form id="auth-form" onsubmit="handleAuth(event)">
                <div class="form-group">
                    <label for="username">İstifadəçi Adı</label>
                    <input type="text" id="username" required placeholder="İstifadəçi adınızı yazın">
                </div>
                <div class="form-group">
                    <label for="password">Şifrə</label>
                    <input type="password" id="password" required placeholder="Şifrənizi yazın">
                </div>
                <button type="submit" id="submit-btn">Daxil Ol</button>
            </form>

            <div class="toggle-link" id="toggle-container">
                Hesabınız yoxdur? <span onclick="toggleForm()">Qeydiyyatdan keçin</span>
            </div>
        </div>

        <!-- Dashboard Card (Initially hidden) -->
        <div class="card" id="dashboard-card" style="display: none;">
            <h1>Xoş Gəldiniz, <span id="dash-username">İstifadəçi</span>!</h1>
            <p class="subtitle">İdarəetmə Paneli (Dashboard)</p>

            <div class="dash-row">
                <div class="dash-label">Ümumi İstifadəçi:</div>
                <div class="dash-value" id="val-users">0</div>
            </div>
            <div class="dash-row">
                <div class="dash-label">Sistem Vaxtı:</div>
                <div class="dash-value" id="val-time">00:00:00</div>
            </div>
            <div class="dash-row">
                <div class="dash-label">Baza Növü:</div>
                <div class="dash-value" style="color: var(--accent);">SQLite</div>
            </div>
            <div class="dash-row">
                <div class="dash-label">Server Uptime:</div>
                <div class="dash-value" id="val-uptime" style="color: var(--text-color);">0s</div>
            </div>

            <button onclick="loadDashboardData()" style="background: var(--accent); margin-top: 1rem;">Məlumatı Yenilə</button>
            <button onclick="handleLogout()" class="logout-btn">Çıxış Et</button>
        </div>

        <!-- API status info -->
        <div class="api-card">
            <div class="status-badge" id="api-status-badge">Yoxlanılır...</div>
            <div class="msg-text" id="api-msg">Zəhmət olmasa gözləyin...</div>
            <button onclick="checkAPI()" style="padding: 0.5rem 1rem; font-size: 0.85rem; width: auto; margin-top: 0;">API Yenilə</button>
        </div>
    </div>

    <script>
        let isLoginMode = true;

        function showAlert(type, msg) {
            const errAlert = document.getElementById('alert-error');
            const succAlert = document.getElementById('alert-success');
            
            errAlert.style.display = 'none';
            succAlert.style.display = 'none';

            if (type === 'error') {
                errAlert.innerText = msg;
                errAlert.style.display = 'block';
            } else if (type === 'success') {
                succAlert.innerText = msg;
                succAlert.style.display = 'block';
            }
        }

        function toggleForm() {
            isLoginMode = !isLoginMode;
            const title = document.getElementById('form-title');
            const subtitle = document.getElementById('form-subtitle');
            const submitBtn = document.getElementById('submit-btn');
            const toggleContainer = document.getElementById('toggle-container');
            const form = document.getElementById('auth-form');

            form.reset();
            document.getElementById('alert-error').style.display = 'none';
            document.getElementById('alert-success').style.display = 'none';

            if (isLoginMode) {
                title.innerHTML = 'Sistemə <span>Giriş</span>';
                subtitle.innerText = 'Lütfən məlumatlarınızı daxil edin';
                submitBtn.innerText = 'Daxil Ol';
                toggleContainer.innerHTML = 'Hesabınız yoxdur? <span onclick="toggleForm()">Qeydiyyatdan keçin</span>';
            } else {
                title.innerHTML = 'Yeni <span>Hesab</span>';
                subtitle.innerText = 'Qeydiyyatdan keçmək üçün məlumatları doldurun';
                submitBtn.innerText = 'Qeydiyyatı Tamamla';
                toggleContainer.innerHTML = 'Artıq hesabınız var? <span onclick="toggleForm()">Giriş edin</span>';
            }
        }

        async function handleAuth(event) {
            event.preventDefault();
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value;
            
            const endpoint = isLoginMode ? '/api/login' : '/api/register';

            try {
                const res = await fetch(endpoint, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });
                
                const data = await res.json();
                
                if (res.ok) {
                    showAlert('success', data.message);
                    if (isLoginMode) {
                        setTimeout(() => {
                            showDashboard(data.username);
                        }, 1000);
                    } else {
                        setTimeout(() => {
                            toggleForm();
                            showAlert('success', 'Hesab yaradıldı. İndi giriş edə bilərsiniz.');
                        }, 1200);
                    }
                } else {
                    showAlert('error', data.error || 'Gözlənilməz bir xəta baş verdi.');
                }
            } catch (e) {
                showAlert('error', 'Serverlə əlaqə kəsildi!');
            }
        }

        async function showDashboard(username) {
            document.getElementById('auth-card').style.display = 'none';
            document.getElementById('dashboard-card').style.display = 'block';
            document.getElementById('dash-username').innerText = username;
            loadDashboardData();
        }

        async function loadDashboardData() {
            try {
                const res = await fetch('/api/dashboard-data');
                const data = await res.json();
                if (res.ok) {
                    document.getElementById('val-users').innerText = data.userCount;
                    document.getElementById('val-time').innerText = data.systemTime;
                    document.getElementById('val-uptime').innerText = data.uptime;
                }
            } catch (e) {
                console.error("Dashboard məlumatı yüklənmədi.");
            }
        }

        function handleLogout() {
            document.getElementById('dashboard-card').style.display = 'none';
            document.getElementById('auth-card').style.display = 'block';
            document.getElementById('auth-form').reset();
            document.getElementById('alert-error').style.display = 'none';
            document.getElementById('alert-success').style.display = 'none';
        }

        async function checkAPI() {
            const badge = document.getElementById('api-status-badge');
            const msg = document.getElementById('api-msg');
            
            badge.innerText = "Yoxlanılır...";
            badge.className = "status-badge";
            
            try {
                const res = await fetch('/api/status');
                const data = await res.json();
                
                badge.innerText = `ONLINE v${data.version}`;
                badge.className = "status-badge success";
                msg.innerText = data.message;
            } catch (e) {
                badge.innerText = "OFFLINE";
                badge.className = "status-badge error";
                msg.innerText = "API-yə qoşulmaq alınmadı!";
            }
        }

        checkAPI();
    </script>
</body>
</html>
